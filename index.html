<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hai Rho — Character Reference Sheet</title>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f3eee5"/>
    <g transform="translate(50 50)" font-family="Georgia, serif" font-style="italic" fill="#3a2a44" text-anchor="middle">
      <text y="-2" font-size="28">Hai</text>
      <text y="22" font-size="14" letter-spacing="2">RHO</text>
    </g>
  </svg>
</template>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* paper tones */
    --paper-cool:  oklch(0.975 0.004 240);
    --paper-cream: oklch(0.972 0.012 80);
    --paper-bone:  oklch(0.955 0.006 80);

    /* ink tones */
    --ink-coal:     oklch(0.20 0.012 60);
    --ink-charcoal: oklch(0.28 0.008 240);

    /* accents */
    --acc-plum:   oklch(0.52 0.13 310);
    --acc-indigo: oklch(0.42 0.07 250);
    --acc-ember:  oklch(0.60 0.13 35);
    --acc-bone:   oklch(0.45 0.01 80);

    /* live tokens, overridden by JS */
    --paper: var(--paper-cool);
    --ink: var(--ink-coal);
    --accent: var(--acc-plum);

    --ink-08: color-mix(in oklab, var(--ink) 8%, transparent);
    --ink-15: color-mix(in oklab, var(--ink) 15%, transparent);
    --ink-30: color-mix(in oklab, var(--ink) 30%, transparent);
    --ink-55: color-mix(in oklab, var(--ink) 55%, transparent);
    --ink-75: color-mix(in oklab, var(--ink) 75%, transparent);

    --display: "Instrument Serif", "Times New Roman", serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --body: "Manrope", system-ui, -apple-system, sans-serif;

    --rule: 0.5px solid var(--ink-15);
    --rule-strong: 0.5px solid var(--ink-30);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .sheet {
    max-width: 1440px;
    margin: 0 auto;
    padding: 56px 64px 80px;
    position: relative;
  }

  /* ── Header ─────────────────────────────────────────── */
  .top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 32px;
    padding-bottom: 22px;
    border-bottom: var(--rule-strong);
  }
  .top .corner {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-55);
    line-height: 1.7;
  }
  .top .corner.right { text-align: right; }
  .top .corner .k { color: var(--ink-30); }

  .nameblock {
    text-align: center;
    line-height: 0.92;
  }
  .nameblock .kicker {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-55);
    margin-bottom: 14px;
  }
  .nameblock h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 148px;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 0.88;
  }
  .nameblock h1 em {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }
  .nameblock .baybayin {
    display: block;
    margin: 14px auto 18px;
    width: 240px;
    height: auto;
    opacity: 0.82;
    mix-blend-mode: multiply;
    filter: contrast(1.05);
  }
  .nameblock .sub {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-75);
  }
  .nameblock .sub .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    transform: translateY(-2px);
    margin: 0 14px;
  }

  /* ── Section heading ────────────────────────────────── */
  .sect {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    align-items: baseline;
    padding-bottom: 14px;
    border-bottom: var(--rule);
  }
  .sect .num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .sect .num b { color: var(--accent); font-weight: 500; margin-right: 10px; }
  .sect .title {
    font-family: var(--display);
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .sect .meta {
    justify-self: end;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .sect.with-meta { grid-template-columns: 220px 1fr auto; }

  /* ── Plate (image cell) ────────────────────────────── */
  .plate {
    position: relative;
    background:
      linear-gradient(var(--ink-08) 0 0) center/100% 100% no-repeat,
      var(--paper);
    background:
      radial-gradient(120% 90% at 50% 100%, var(--ink-08), transparent 70%),
      var(--paper);
    border: var(--rule);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .plate::before {
    /* corner tick marks */
    content: "";
    position: absolute; inset: 6px;
    background:
      linear-gradient(var(--ink-30), var(--ink-30)) 0 0/10px 0.5px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 0 0/0.5px 10px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 100% 0/10px 0.5px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 100% 0/0.5px 10px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 0 100%/10px 0.5px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 0 100%/0.5px 10px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 100% 100%/10px 0.5px no-repeat,
      linear-gradient(var(--ink-30), var(--ink-30)) 100% 100%/0.5px 10px no-repeat;
    pointer-events: none;
  }
  .plate img {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: 100%;
    object-fit: contain;
    object-position: center bottom;
    mix-blend-mode: multiply;
    filter: contrast(1.02);
  }
  .plate .tag {
    position: absolute;
    left: 12px;
    bottom: 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-55);
    z-index: 2;
  }
  .plate .tag b { color: var(--ink); font-weight: 500; margin-right: 8px; }
  /* Face & detail plates: tag at top so it doesn't sit over the subject's body */
  .grid-6 .plate .tag,
  .grid-detail .plate .tag {
    top: 10px;
    bottom: auto;
  }
  .plate .stamp {
    position: absolute;
    right: 12px;
    top: 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-30);
    z-index: 2;
  }

  /* ── Hero block ────────────────────────────────────── */
  .hero {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
  }
  .hero .plate.main { height: 720px; }
  .hero .side {
    display: grid;
    grid-template-rows: 1fr;
    gap: 18px;
  }
  .hero .vitals { height: 100%; }
  .vitals {
    border: var(--rule);
    padding: 22px 24px 24px;
  }
  .vitals .hd {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-55);
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: var(--rule);
  }
  .vitals dl { margin: 0; display: grid; grid-template-columns: 100px 1fr; gap: 10px 16px; }
  .vitals dt {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-55);
    padding-top: 3px;
  }
  .vitals dd {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--ink);
  }
  .vitals dd .accent { color: var(--accent); }
  .vitals dd em {
    font-family: var(--display);
    font-size: 17px;
    font-style: italic;
  }

  /* ── Grids ─────────────────────────────────────────── */
  .grid-4 {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }
  .grid-4 .plate { height: 520px; }

  .grid-5 {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 18px;
  }
  .grid-5 .plate { height: 520px; }

  .grid-6 {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
  }
  .grid-6 .plate { height: 240px; }

  .grid-detail {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1.1fr 1.4fr 1fr;
    gap: 24px;
  }
  .grid-detail .plate { height: 360px; }

  /* ── Palette section ──────────────────────────────── */
  .palette-wrap {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .palgroup {
    border: var(--rule);
    padding: 22px 24px 24px;
  }
  .palgroup h3 {
    font-family: var(--display);
    font-style: italic;
    font-weight: 400;
    margin: 0 0 4px;
    font-size: 22px;
  }
  .palgroup .palhd {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-55);
    padding-bottom: 14px;
    margin-bottom: 18px;
    border-bottom: var(--rule);
  }
  .swatch {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    border-bottom: var(--rule);
  }
  .swatch:last-child { border-bottom: 0; padding-bottom: 0; }
  .swatch .chip {
    width: 44px; height: 30px;
    border-radius: 2px;
    box-shadow: 0 0 0 0.5px var(--ink-15) inset;
  }
  .swatch .name {
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .swatch .hex {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-55);
    letter-spacing: 0.04em;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  .swatch .hex:hover { color: var(--ink); }

  /* eye palette: strip variant */
  .eyestrip {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border: var(--rule);
  }
  .eyestrip > div {
    aspect-ratio: 1 / 1.2;
    border-right: var(--rule);
    position: relative;
  }
  .eyestrip > div:last-child { border-right: 0; }
  .eyestrip > div::after {
    content: attr(data-hex);
    position: absolute;
    left: 8px; bottom: 6px;
    font-family: var(--mono);
    font-size: 9.5px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  /* ── Glyph library ──────────────────────────────── */
  .glyphs {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1.1fr 1fr 1fr;
    gap: 24px;
  }
  .glyph-card {
    border: var(--rule);
    padding: 22px 24px 18px;
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 16px;
    min-height: 320px;
    position: relative;
  }
  .glyph-card .corner-no {
    position: absolute;
    top: 14px; right: 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-30);
  }
  .glyph {
    width: 100%;
    height: 100%;
    background: #223644;
    -webkit-mask-position: center;
            mask-position: center;
    -webkit-mask-size: contain;
            mask-size: contain;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-mode: luminance;
            mask-mode: luminance;
  }
  .glyph.wide {
    -webkit-mask-size: 100% auto;
            mask-size: 100% auto;
  }
  .glyph-meta {
    border-top: var(--rule);
    padding-top: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 6px 14px;
  }
  .glyph-meta .name {
    font-family: var(--display);
    font-style: italic;
    font-size: 19px;
    line-height: 1;
  }
  .glyph-meta .tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .glyph-meta .desc {
    grid-column: 1 / -1;
    font-size: 12px;
    line-height: 1.45;
    color: var(--ink-75);
    text-wrap: pretty;
  }

  /* ── Notes column ─────────────────────────────────── */
  .notes {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .note h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 10px;
    font-weight: 500;
  }
  .note p {
    margin: 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-75);
    text-wrap: pretty;
  }
  .note p + p { margin-top: 8px; }

  /* ── Footer ────────────────────────────────────────── */
  .foot {
    margin-top: 72px;
    padding-top: 18px;
    border-top: var(--rule-strong);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: center;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .foot .center {
    font-family: var(--display);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-75);
    text-transform: none;
    letter-spacing: 0;
  }
  .foot .right { text-align: right; }

  /* ── Colophon ─────────────────────────────────────── */
  .colophon {
    margin-top: 56px;
    padding-top: 22px;
    border-top: var(--rule);
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    align-items: start;
  }
  .colophon .hd {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .colophon .hd b { color: var(--accent); font-weight: 500; margin-right: 10px; }
  .colophon dl {
    margin: 0;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 10px 24px;
    align-items: baseline;
  }
  .colophon dt {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .colophon dd {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }
  .colophon dd .by { color: var(--ink-55); }
  .colophon a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 0.5px solid color-mix(in oklab, var(--accent) 40%, transparent);
    padding-bottom: 1px;
    transition: border-color .15s ease;
  }
  .colophon a:hover { border-bottom-color: var(--accent); }

  /* ── View toggle (2D / 3D) ──────────────────────────── */
  .view-toggle {
    position: absolute; bottom: 10px; right: 12px; z-index: 3;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: background .18s, color .18s, border-color .18s, box-shadow .18s;
  }
  .view-toggle.off {
    background: color-mix(in oklab, var(--accent) 8%, var(--paper));
    color: var(--accent);
    border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent);
    box-shadow: 0 0 0 2.5px color-mix(in oklab, var(--accent) 12%, transparent);
  }
  .view-toggle.off:hover {
    background: color-mix(in oklab, var(--accent) 16%, var(--paper));
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent),
                0 2px 10px color-mix(in oklab, var(--accent) 22%, transparent);
  }
  .view-toggle.on {
    background: var(--accent);
    color: var(--paper);
    border: 1px solid var(--accent);
    box-shadow: 0 2px 10px color-mix(in oklab, var(--accent) 38%, transparent);
  }
  .view-toggle.on:hover {
    background: color-mix(in oklab, var(--accent) 82%, var(--ink));
    box-shadow: 0 2px 14px color-mix(in oklab, var(--accent) 50%, transparent);
  }
  .view-opts-btn {
    position: absolute; bottom: 10px; z-index: 3;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink-55);
    border: 1px solid var(--ink-30);
    transition: background .15s, color .15s;
  }
  .view-opts-btn:hover { background: var(--ink-08); color: var(--ink); }
  .view-opts-btn.active { background: var(--ink-15); }

  /* ── Footer ─────────────────────────────────────────── */
  .crosshair {
    position: absolute;
    width: 18px; height: 18px;
    pointer-events: none;
  }
  .crosshair::before, .crosshair::after {
    content: ""; position: absolute; background: var(--ink-30);
  }
  .crosshair::before { left: 50%; top: 0; bottom: 0; width: 0.5px; transform: translateX(-50%); }
  .crosshair::after  { top: 50%; left: 0; right: 0; height: 0.5px; transform: translateY(-50%); }
  .crosshair.tl { top: 28px; left: 28px; }
  .crosshair.tr { top: 28px; right: 28px; }
  .crosshair.bl { bottom: 40px; left: 28px; }
  .crosshair.br { bottom: 40px; right: 28px; }

  @media (max-width: 900px) {
    .sheet { padding: 24px 18px 40px; }

    /* Hide decorative chrome that depends on absolute positioning at full size */
    .crosshair { display: none; }

    /* ── Top header: stack the three columns ── */
    .top {
      grid-template-columns: 1fr;
      gap: 18px;
      padding-bottom: 16px;
      text-align: left;
    }
    .top .corner,
    .top .corner.right { text-align: left; }
    .top .corner > div { display: inline; margin-right: 14px; }
    .top .corner > div + div::before { content: ""; }

    .nameblock { text-align: center; }
    .nameblock .kicker {
      font-size: 9.5px;
      letter-spacing: 0.24em;
      margin-bottom: 10px;
    }
    .nameblock .baybayin { width: 60vw; max-width: 240px; margin: 8px auto 12px; }
    .nameblock h1 {
      font-size: clamp(72px, 22vw, 132px);
      line-height: 0.9;
    }
    .nameblock .sub {
      font-size: 10px;
      letter-spacing: 0.18em;
      margin-top: 12px;
    }
    .nameblock .sub .dot { margin: 0 10px; }

    /* ── Section headings: stack number / title / meta ── */
    .sect,
    .sect.with-meta {
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 36px;
      padding-bottom: 12px;
    }
    .sect .meta { justify-self: start; }
    .sect .title { font-size: 24px; line-height: 1.1; }

    /* ── Hero block: single column ── */
    .hero {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    .hero .plate.main { height: 78vw; min-height: 360px; max-height: 560px; }

    .vitals { padding: 18px 18px 20px; }

<script type="text/babel">


const MODEL_ENC_URL = "https://pub-06ddcb0ce89a428483be74b6d0071c73.r2.dev/assets/HaiRho_Civet_00.enc";
const MODEL_KEY_B64 = "PiojI+Po3tc5wcU+pClV2Jo5OgMu0Q49mzmsl9khJvc=";

async function loadEncryptedModel(url, keyB64) {
  const buf = await fetch(url).then(r => r.arrayBuffer());
  const keyBytes = Uint8Array.from(atob(keyB64), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: new Uint8Array(buf, 0, 12) },
    key,
    buf.slice(12)
  );
  return URL.createObjectURL(new Blob([plain], { type: 'model/gltf-binary' }));
}

function CopyHex({ hex, className, style }) {
  const [copied, setCopied] = React.useState(false);
  function handleClick() {
    navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }
  return (
    <span className={className} onClick={handleClick} title="Click to copy"
      style={{ cursor: 'pointer', userSelect: 'none', transition: 'color .15s', ...style }}>
      {copied ? 'Copied!' : hex.toUpperCase()}
    </span>
  );
}

function EyeChip({ hex }) {
  const [copied, setCopied] = React.useState(false);
  function handleClick() {
    navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }
  return (
    <div
      style={{ background: hex, cursor: 'pointer' }}
      data-hex={copied ? 'Copied!' : hex.toUpperCase()}
      onClick={handleClick}
      title="Click to copy"
    />
  );
}

const FUR = [
{ name: "Primary", hex: "#59574E" },
{ name: "Secondary", hex: "#BBB8A7" },
{ name: "Dark", hex: "#312F29" },
{ name: "Accent", hex: "#223644" }];

const BODY = [
{ name: "Palm", hex: "#775954" },
{ name: "Beans", hex: "#582720" },
{ name: "Nose", hex: "#5D170D" },
{ name: "Nails", hex: "#77704D" },
{ name: "Ears Inner", hex: "#944C4C" },
{ name: "Hair", hex: "#FFF7D1" }];

const EYES = ["#000000", "#150B18", "#5B377C", "#8A56BF", "#D088F1"];

function Swatch({ name, hex }) {
  return (
    <div className="swatch">
      <div className="chip" style={{ background: hex }} />
      <div className="name">{name}</div>
      <CopyHex hex={hex} className="hex" />
    </div>);

}

  const [show3DOptions, setShow3DOptions] = React.useState(false);
  const [modelSrc, setModelSrc] = React.useState(null);
  const [modelDecrypting, setModelDecrypting] = React.useState(false);
  const modelViewerRef = React.useRef(null);
  const origEmissive = React.useRef(null);
  const [emissiveBoost, setEmissiveBoost] = React.useState(3);
  const [exposure, setExposure] = React.useState(1.2);

  // Fetch and decrypt the model the first time 3D is shown
  React.useEffect(() => {
    if (!show3D || modelSrc) return;
    setModelDecrypting(true);
    loadEncryptedModel(MODEL_ENC_URL, MODEL_KEY_B64)
      .then(url => setModelSrc(url))
      .catch(e => console.error('Model decryption failed', e))
      .finally(() => setModelDecrypting(false));
  }, [show3D]); // eslint-disable-line react-hooks/exhaustive-deps

  // Store original emissive factors when model loads, then apply initial boost
  React.useEffect(() => {
    if (!show3D) { origEmissive.current = null; return; }
    const mv = modelViewerRef.current;
    if (!mv) return;
    const handleLoad = () => {
      origEmissive.current = mv.model.materials.map(mat => ({
        mat, orig: [...mat.emissiveFactor],
      }));
      origEmissive.current.forEach(({ mat, orig }) =>
        mat.setEmissiveFactor(orig.map(v => v * emissiveBoost))
      );
    };
    mv.addEventListener('load', handleLoad);
    return () => mv.removeEventListener('load', handleLoad);
  }, [show3D]); // eslint-disable-line react-hooks/exhaustive-deps

  // Re-apply boost from stored originals whenever the slider changes
  React.useEffect(() => {
    if (!origEmissive.current) return;
    origEmissive.current.forEach(({ mat, orig }) =>
      mat.setEmissiveFactor(orig.map(v => v * emissiveBoost))
    );
  }, [emissiveBoost]);

          <h1>Hai <em>Rho</em></h1>

            Civet <span className="dot" />
            Asian Palm

        </div>

          <div><span className="k">Subject /</span> Hai Rho</div>

      {/* ─────────── Section I: Plates ─────────── */}

        <div className="title">Full <i style={{ fontFamily: "var(--display)", fontStyle: "italic" }}>turnaround</i> and proportion.</div>
        <div className="meta">05 plates · neutral pose</div>

      <div className="hero">

          <button
            onClick={() => setShow3D(s => !s)}
            className={`view-toggle ${show3D ? 'on' : 'off'}`}

            {show3D ? '2D' : '3D'}

          {show3D && (
            <>
              <button
                onClick={() => setShow3DOptions(o => !o)}
                className={`view-opts-btn ${show3DOptions ? 'active' : ''}`}
                style={{ right: 72 }}

              {show3DOptions && (
                <div style={{

                  background: 'var(--paper)', border: '0.5px solid var(--ink-30)',
                  padding: '12px 14px', minWidth: 180,
                  boxShadow: '0 4px 20px rgba(0,0,0,0.10)',
                  fontFamily: 'var(--mono)', fontSize: 10,
                }}>
                  {[
                    { label: 'Exposure', value: exposure, min: 0.5, max: 3, step: 0.1, set: setExposure },
                    { label: 'Emissive', value: emissiveBoost, min: 1, max: 10, step: 0.5, set: setEmissiveBoost },
                  ].map(({ label, value, min, max, step, set }) => (
                    <div key={label} style={{ marginBottom: 10 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between',

                    </div>

                </div>

            </>

          {show3D ? (
            modelDecrypting ? (
              <div style={{

                color: 'var(--ink-55)',
              }}>Loading…</div>
            ) : (
              <model-viewer

                camera-controls=""
                shadow-intensity="1"

        </div>

              <dt>Name</dt>     <dd><em>Hai Rho</em></dd>

              <dt>Tail</dt>     <dd>Banded, tufted, blue dorsal stripe</dd>

      <div className="grid-5">

          <img src="assets/images/01 Three-Fourths.png" alt="Three-quarter view" />
